const hexToRgba = (hex, a) => {
  const h = hex.replace("#", "");
  const n = parseInt(h.length === 3 ? h.split("").map((c) => c + c).join("") : h, 16);
  return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;
};

const parseHash = () => {

/* ---------- Fundo estelar ---------- */
function Starfield() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    const ctx = canvas.getContext("2d");
    let raf, stars = [];
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const count = Math.floor((canvas.width * canvas.height) / 6000);
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2, tw: Math.random() * Math.PI * 2,
        sp: Math.random() * 0.015 + 0.004,
      }));
    };
    resize();
    window.addEventListener("resize", resize);
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        if (!reduced) s.tw += s.sp;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(237,237,247,${0.35 + Math.abs(Math.sin(s.tw)) * 0.65})`;
        ctx.fill();
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);
  return <canvas ref={ref} style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none" }} />;
}

/* ---------- zona de arrastar arquivos (imagens/áudio) ---------- */
function DropZone({ color, accept, label, busy, onFile }) {
  const [over, setOver] = useState(false);
  const inputRef = useRef(null);
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => {
        e.preventDefault(); setOver(false);
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) onFile(f);
      }}
      onClick={() => inputRef.current && inputRef.current.click()}
      style={{
        border: `1px dashed ${hexToRgba(color, over ? 0.9 : 0.45)}`,
        borderRadius: 12, padding: "16px 12px", margin: "6px 0 14px",
        color: over ? color : "#9FA9C5", fontSize: 13, letterSpacing: "0.05em",
        cursor: "pointer", textAlign: "center",
        background: over ? hexToRgba(color, 0.08) : "transparent",
        transition: "all .2s",
      }}>
      {busy ? "✦ enviando..." : label}
      <input ref={inputRef} type="file" accept={accept} style={{ display: "none" }}
        onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onFile(f); e.target.value = ""; }} />
    </div>
  );
}

function Nebula({ perfil, stars, setPerfil, setStars, readOnly, headerRight, status, upload }) {
  const [active, setActive] = useState(null);
  const [hovered, setHovered] = useState(null);
  const [editing, setEditing] = useState(false);
  const [placing, setPlacing] = useState(null);
  const [linking, setLinking] = useState(null); // id da estrela sendo religada
  const [hintMsg, setHintMsg] = useState("");
  const hintTimer = useRef(null);
  // mostra um aviso temporário que some sozinho (não fica tampando o céu)
  const flash = (msg) => {
    setHintMsg(msg);
    clearTimeout(hintTimer.current);
    hintTimer.current = setTimeout(() => setHintMsg(""), 2200);
  };

  const starById = (id) => stars.find((s) => s.id === id);
  const updStar = (id, patch) => setStars(stars.map((s) => (s.id === id ? { ...s, ...patch } : s)));

  const handleSkyClick = (e) => {
    if (!placing) return;
    const x = Math.min(95, Math.max(5, (e.clientX / window.innerWidth) * 100));
    const y = Math.min(90, Math.max(14, (e.clientY / window.innerHeight) * 100));
    if (placing.mode === "move") {
      updStar(placing.id, { x, y });
      setPlacing(null);
    } else {
      const id = "s" + Date.now();
      setStars([...stars, { id, label: "Nova estrela", color: PALETTE[stars.length % PALETTE.length], x, y, desc: "", links: [], parents: ["nucleo"] }]);
      setPlacing(null);
      setActive(id);
      setEditing(true);
    }
  };

  const deleteStar = (id) => {
    // remove a estrela apagada das ligações das outras; quem ficar sem nada volta ao núcleo
    setStars(
      stars.filter((s) => s.id !== id).map((s) => {
        const conns = connsOf(s).filter((c) => c !== id);
        return { ...s, parents: conns.length ? conns : ["nucleo"] };
      })
    );
    setActive(null);
  };

  /* ---------- caminhos de estrelas (ligações múltiplas) ---------- */
  // compatível com perfis antigos: 'parent' (um só) vira lista 'parents'
  const connsOf = (s) =>
    Array.isArray(s.parents) ? s.parents : s.parent ? [s.parent] : ["nucleo"];

  const completeLink = (targetId) => {
    if (!linking) return;
    if (targetId === linking) { flash("uma estrela não pode se ligar a si mesma ✦"); return; }
    const st = stars.find((x) => x.id === linking);
    if (!st) return;
    const conns = connsOf(st);
    const removing = conns.includes(targetId);
    updStar(linking, { parents: removing ? conns.filter((c) => c !== targetId) : [...conns, targetId] });
    flash(removing ? "ligação desfeita ✦" : "ligação criada ✦");
  };

  const allNodes = [{ ...CORE, label: perfil.nome, color: "#AEB9FF", core: true }, ...stars];
  const nodeById = (id) => allNodes.find((n) => n.id === id);
  const zoomNode = active && !placing ? nodeById(active) : null;
  const TX = VX; // estrela em foco sempre à esquerda (edição e visualização)
  const TY = VY;

  /* ---------- câmera livre: arrastar para navegar + scroll para zoom ---------- */
  const [cam, setCam] = useState({ x: 0, y: 0, k: 1 });
  const camRef = useRef(cam);
  useEffect(() => { camRef.current = cam; }, [cam]);
  const [interacting, setInteracting] = useState(false);
  const interactTimer = useRef(null);
  const dragRef = useRef(null);
  const bump = () => {
    setInteracting(true);
    clearTimeout(interactTimer.current);
    interactTimer.current = setTimeout(() => setInteracting(false), 200);
  };
  const camFree = !zoomNode && !placing;

  /* ---------- upload de mídia ---------- */
  const [upBusy, setUpBusy] = useState(false);
  const [upMsg, setUpMsg] = useState("");
  const doUpload = async (file, done) => {
    if (!upload) return;
    setUpBusy(true); setUpMsg("");
    try {
      const url = await upload(file);
      done(url, file);
      setUpMsg("enviado ✦");
    } catch (e) {
      setUpMsg("erro: " + (e.message || "falha no envio"));
    } finally {
      setUpBusy(false);
      setTimeout(() => setUpMsg(""), 3500);
    }
  };

  /* ---------- trilha sonora do universo ---------- */
  // música da estrela em foco > música do perfil > silêncio
  const focusStar = active && active !== "nucleo" ? stars.find((s) => s.id === active) : null;
  const track = (focusStar && focusStar.musica) || perfil.musica || "";
  const audioRef = useRef(null);
  const [soundOn, setSoundOn] = useState(true);
  const [needsTap, setNeedsTap] = useState(false);
  const spotTrack = spotifyEmbed(track);
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    if (!track || !soundOn || spotTrack) { a.pause(); return; }
    if (a.getAttribute("data-url") !== track) {
      a.setAttribute("data-url", track);
      a.src = track;
    }
    a.loop = true;
    a.volume = 0.4;
    a.play().then(() => setNeedsTap(false)).catch(() => setNeedsTap(true));
  }, [track, soundOn, spotTrack]);
  const onSkyPointerDown = (e) => {
    if (!camFree) return;
    if (e.target.closest && e.target.closest("button")) return; // não rouba o clique das estrelas
    dragRef.current = { x: e.clientX, y: e.clientY };
  };
  const onSkyPointerMove = (e) => {
    if (!dragRef.current) return;
    bump();
    const dx = e.clientX - dragRef.current.x;
    const dy = e.clientY - dragRef.current.y;
    dragRef.current = { x: e.clientX, y: e.clientY };
    setCam((c) => ({ ...c, x: c.x + (dx / window.innerWidth) * 100, y: c.y + (dy / window.innerHeight) * 100 }));
  };
  const onSkyPointerUp = () => { dragRef.current = null; };
  const onSkyWheel = (e) => {
    if (!camFree) return;
    bump();
    const vw = window.innerWidth, vh = window.innerHeight;
    const c = camRef.current;
    const k2 = Math.min(4, Math.max(0.4, c.k * Math.exp(-e.deltaY * 0.0012)));
    // zoom mirando o cursor: o ponto sob o mouse permanece no lugar
    const tx = (c.x / 100) * vw, ty = (c.y / 100) * vh;
    const px = e.clientX - vw / 2, py = e.clientY - vh / 2;
    const tx2 = px - (px - tx) * (k2 / c.k);
    const ty2 = py - (py - ty) * (k2 / c.k);
    setCam({ x: (tx2 / vw) * 100, y: (ty2 / vh) * 100, k: k2 });
  };
  const camMoved = cam.k !== 1 || Math.abs(cam.x) > 0.01 || Math.abs(cam.y) > 0.01;

  const worldStyle = {
    position: "fixed", inset: 0, zIndex: 5,
    transformOrigin: zoomNode ? `${zoomNode.x}% ${zoomNode.y}%` : "50% 50%",
    transform: zoomNode
      ? `translate(${TX - zoomNode.x}%, ${TY - zoomNode.y}%) scale(2.1)`
      : `translate(${cam.x}%, ${cam.y}%) scale(${cam.k})`,
    transition: interacting
      ? "none"
      : "transform .8s cubic-bezier(.22,.9,.28,1), transform-origin .8s cubic-bezier(.22,.9,.28,1)",
    cursor: camFree ? "grab" : "default",
    touchAction: "none",
  };

  const renderFocusScene = () => {
    if (!active || placing) return null;
    const node = nodeById(active);
    if (!node) return null;
    const color = node.color;
    const isCore = active === "nucleo";
    const star = isCore ? null : starById(active);

    if (editing && !readOnly) {
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 30, animation: "fadeIn .5s ease" }}>
          {/* halo de edição girando ao redor da estrela em foco (esquerda) */}
          <div style={{
            position: "fixed", left: `${VX}%`, top: `${VY}%`, transform: "translate(-50%,-50%)",
            width: "22vmin", height: "22vmin", borderRadius: "50%",
            border: `1px dashed ${hexToRgba(color, 0.4)}`, animation: "spin 40s linear infinite", pointerEvents: "none",
          }} />
          {/* campos flutuando à direita, coluna rolável */}
          <div className="neb-scroll" style={{
            position: "fixed", left: `calc(${VX}% + 15vmin)`, right: "4vw",
            top: `calc(${VY}% - 52px)`,
            maxHeight: `calc(${100 - VY}vh + 20px)`,
            maxWidth: 560, overflowY: "auto",
            zIndex: 31, animation: "riseSide .6s ease", textAlign: "center",
            padding: "30px 14px 0 14px", boxSizing: "border-box",
          }}>
            {isCore ? (
              <React.Fragment>
                <input style={{ ...UI.ghostInput(color), fontFamily: "'Unbounded', sans-serif", fontSize: 20 }}
                  value={perfil.nome} placeholder="Seu nome"
                  onChange={(e) => setPerfil({ ...perfil, nome: e.target.value })} />
                <textarea style={{ ...UI.ghostInput(color), minHeight: 70, resize: "vertical" }}
                  value={perfil.bio} placeholder="Sua bio"
                  onChange={(e) => setPerfil({ ...perfil, bio: e.target.value })} />
                <input
                  style={UI.ghostInput(color)}
                  value={perfil.musica || ""}
                  placeholder="♪ música do universo (.mp3 ou link do Spotify)"
                  onChange={(e) => setPerfil({ ...perfil, musica: e.target.value })}
                />
                {upload && (
                  <DropZone color={color} accept="audio/*" busy={upBusy}
                    label="♪ ou arraste um áudio aqui (mp3, ogg...)"
                    onFile={(f) => doUpload(f, (url) => setPerfil({ ...perfil, musica: url }))} />
                )}
                {perfil.musica && (
                  <button style={{ ...UI.starText("#FF8E8E"), fontSize: 11 }}
                    onClick={() => setPerfil({ ...perfil, musica: "" })}>
                    ─ remover música do universo
                  </button>
                )}
                {upMsg && <p style={{ fontSize: 12, color: "#CBD5FF" }}>{upMsg}</p>}
              </React.Fragment>
            ) : (
              <React.Fragment>
                <input style={{ ...UI.ghostInput(color), fontFamily: "'Unbounded', sans-serif", fontSize: 18 }}
                  value={star.label} placeholder="Nome da estrela"
                  onChange={(e) => updStar(star.id, { label: e.target.value })} />
                <textarea style={{ ...UI.ghostInput(color), minHeight: 54, resize: "vertical" }}
                  value={star.desc} placeholder="Descrição"
                  onChange={(e) => updStar(star.id, { desc: e.target.value })} />
                <div style={{ display: "flex", justifyContent: "center", gap: 14, flexWrap: "wrap", margin: "10px 0 20px" }}>
                  {PALETTE.map((c) => (
                    <button key={c} onClick={() => updStar(star.id, { color: c })} aria-label={`Cor ${c}`}
                      style={{
                        width: 16, height: 16, borderRadius: "50%", cursor: "pointer",
                        background: `radial-gradient(circle, #fff 25%, ${c} 90%)`, border: "none",
                        boxShadow: star.color === c ? `0 0 14px 5px ${hexToRgba(c, 0.8)}` : `0 0 8px 2px ${hexToRgba(c, 0.4)}`,
                        transform: star.color === c ? "scale(1.35)" : "none", transition: "all .2s",
                      }} />
                  ))}
                  <input type="color" value={star.color} aria-label="Cor personalizada"
                    onChange={(e) => updStar(star.id, { color: e.target.value })}
                    style={{ width: 20, height: 20, border: "1px dashed rgba(255,255,255,0.4)", borderRadius: "50%", background: "transparent", cursor: "pointer", padding: 0 }} />
                </div>
                {star.links.map((l, i) => (
                  <div key={i} style={{ marginBottom: 6 }}>
                    <input style={UI.ghostInput(color)} placeholder="Título do link" value={l.titulo}
                      onChange={(e) => { const links = [...star.links]; links[i] = { ...l, titulo: e.target.value }; updStar(star.id, { links }); }} />
                    <input style={{ ...UI.ghostInput(color), fontSize: 13, opacity: 0.8 }} placeholder="https://..." value={l.url}
                      onChange={(e) => { const links = [...star.links]; links[i] = { ...l, url: e.target.value }; updStar(star.id, { links }); }} />
                    <button style={{ ...UI.starText("#FF8E8E"), fontSize: 11 }}
                      onClick={() => updStar(star.id, { links: star.links.filter((_, j) => j !== i) })}>
                      ─ remover
                    </button>
                  </div>
                ))}
                <button style={UI.starText(color)}
                  onClick={() => updStar(star.id, { links: [...star.links, { titulo: "", url: "" }] })}>
                  ＋ novo satélite
                </button>
                {upload && (
                  <DropZone color={color} accept="image/*" busy={upBusy}
                    label="◐ arraste uma imagem aqui (ou clique para escolher)"
                    onFile={(f) => doUpload(f, (url, file) =>
                      updStar(star.id, { links: [...star.links, { titulo: file.name.replace(/\.[^.]+$/, ""), url }] })
                    )} />
                )}
                <input
                  style={UI.ghostInput(color)}
                  value={star.musica || ""}
                  placeholder="♪ música desta estrela (.mp3 ou Spotify, opcional)"
                  onChange={(e) => updStar(star.id, { musica: e.target.value })}
                />
                {upload && (
                  <DropZone color={color} accept="audio/*" busy={upBusy}
                    label="♪ ou arraste um áudio para esta estrela"
                    onFile={(f) => doUpload(f, (url) => updStar(star.id, { musica: url }))} />
                )}
                {star.musica && (
                  <button style={{ ...UI.starText("#FF8E8E"), fontSize: 11 }}
                    onClick={() => updStar(star.id, { musica: "" })}>
                    ─ remover música da estrela
                  </button>
                )}
                {upMsg && <p style={{ fontSize: 12, color: "#CBD5FF" }}>{upMsg}</p>}
                <div style={{ marginTop: 22, display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
                  <button style={UI.starText(color)} onClick={() => setPlacing({ mode: "move", id: star.id })}>✥ mover no céu</button>
                  <button style={UI.starText(color)} onClick={() => { setLinking(star.id); setHintMsg(""); setActive(null); }}>🔗 ligações</button>
                  <button style={UI.starText("#FF8E8E")} onClick={() => deleteStar(star.id)}>☄ apagar estrela</button>
                </div>
                <p style={{ fontSize: 12, color: "#9FA9C5", letterSpacing: "0.06em", marginTop: 14 }}>
                  ✦ ligada a:{" "}
                  {connsOf(star)
                    .map((id) => (id === "nucleo" ? "Núcleo" : stars.find((x) => x.id === id)?.label || "?"))
                    .join(" · ") || "nada (estrela solta)"}
                </p>
              </React.Fragment>
            )}
            <div style={{ marginTop: 26, paddingBottom: 8 }}>
              <button style={UI.starText("#9FA9C5")} onClick={() => setEditing(false)}>✓ concluir edição</button>
            </div>

          </div>
        </div>
      );
    }

    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 30, animation: "fadeIn .6s ease" }}>
        {/* fundo clicável para voltar */}
        <div onClick={() => setActive(null)} style={{ position: "absolute", inset: 0, cursor: "zoom-out" }} />

        <div style={{
          position: "fixed", top: `${VY}%`, left: `calc(${VX}% + 7vmin)`, width: "9vmin", height: 1,
          background: `linear-gradient(90deg, ${hexToRgba(color, 0.9)}, transparent)`,

        }} />

        {/* conteúdo flutuando à direita, sem caixa */}
        <div className="neb-scroll" style={{
          position: "fixed",
          left: `calc(${VX}% + 15vmin)`,
          right: "4vw",
          // ancorado para o CENTRO DO TÍTULO cair na altura da estrela/linha
          top: `calc(${VY}% - 78px)`,
          maxHeight: `calc(${100 - VY}vh + 40px)`,
          maxWidth: 560,
          overflowY: "auto",
          zIndex: 31,
          animation: "riseSide .7s ease",
          // respiro interno para a aura das letras não ser cortada nas bordas
          padding: "56px 12px 10px 20px",
          boxSizing: "border-box",
        }}>
          <h2 style={{
            ...UI.display, fontSize: "clamp(20px, 4.6vmin, 34px)", fontWeight: 800,
            margin: "0 0 4px", color: "#fff", letterSpacing: "0.06em",
            textShadow: `0 0 24px ${hexToRgba(color, 0.8)}, 0 0 60px ${hexToRgba(color, 0.4)}`,
          }}>
            {isCore ? perfil.nome : star.label}
          </h2>
          {isCore && (
            <p style={{ margin: "0 0 10px", color: hexToRgba(color, 0.95), fontSize: 14, letterSpacing: "0.1em" }}>
              {perfil.handle}
            </p>
          )}
          {(isCore ? perfil.bio : star.desc) && (
            <p style={{
              margin: "6px 0 18px", lineHeight: 1.7, color: "#CFCBEF", fontSize: 15,
              textShadow: "0 0 12px rgba(1,2,8,1), 0 0 24px rgba(1,2,8,1)",
            }}>

            </p>
          )}
          {!isCore && star.links.length === 0 && !star.desc && !readOnly && (
            <p style={{ color: "#9FA9C5", fontSize: 13 }}>

            </p>
          )}

          {/* itens: imagem vira imagem, música ganha ♪, resto vira link */}
          {!isCore && star.links.map((l, i) => {
            const kind = detectKind(l.url);
            if (kind === "image") {
              return (
                <a key={i} href={l.url} target="_blank" rel="noreferrer" onClick={(e) => e.stopPropagation()}

                    style={{
                      maxWidth: "100%", maxHeight: "38vh", borderRadius: 14, display: "block",

                    }} />
                  {l.titulo && (

                  display: "flex", alignItems: "center", gap: 12, padding: "11px 2px",
                  textDecoration: "none", animation: `riseItem ${0.5 + i * 0.12}s ease`,

                <span style={{
                  flexShrink: 0, width: 9, height: 9, borderRadius: "50%",
                  background: `radial-gradient(circle, #fff 25%, ${color} 90%)`,
                  boxShadow: `0 0 12px 3px ${hexToRgba(color, 0.55)}`, animation: "pulse 3s ease-in-out infinite",
                }} />
                <span style={{
                  color: "#EDEDF7", fontFamily: "'Space Grotesk', sans-serif", fontSize: 15,
                  letterSpacing: "0.05em", textShadow: `0 0 10px rgba(1,2,8,1), 0 0 18px ${hexToRgba(color, 0.4)}`,

        <p style={{
          position: "fixed", bottom: 18, left: "50%", transform: "translateX(-50%)",

    <div style={UI.root}>

        <div style={{ ...UI.display, fontSize: 16, fontWeight: 800, letterSpacing: "0.18em" }}>NÉBULA</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          {status && <span style={{ fontSize: 12, color: "#CBD5FF" }}>{status}</span>}

            <React.Fragment>
              <button style={UI.btn} onClick={() => { setActive(null); setEditing(false); setPlacing({ mode: "new" }); }}>
                ＋ Nova estrela
              </button>
              <button
                style={editing ? { ...UI.ghostBtn, borderColor: "#DCE4FF", color: "#DCE4FF" } : UI.ghostBtn}

              </button>
            </React.Fragment>
          )}
          {headerRight}
        </div>
      </header>

      <div
        style={worldStyle}
        onPointerDown={onSkyPointerDown}
        onPointerMove={onSkyPointerMove}
        onPointerUp={onSkyPointerUp}
        onPointerLeave={onSkyPointerUp}
        onWheel={onSkyWheel}
      >
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
          {stars.flatMap((s) =>
            connsOf(s).map((pid) => {
              const p = pid !== "nucleo" ? stars.find((x) => x.id === pid) : null;
              if (pid !== "nucleo" && !p) return null;
              const px = p ? p.x : CORE.x;
              const py = p ? p.y : CORE.y;
              const lit = [s.id, pid].includes(hovered) || [s.id, pid].includes(active);
              return (
                <line key={s.id + "-" + pid} x1={px} y1={py} x2={s.x} y2={s.y}
                  stroke={lit ? hexToRgba(s.color, 0.8) : hexToRgba(s.color, 0.28)}
                  strokeWidth={lit ? 0.28 : 0.14}
                  style={{ transition: "stroke .25s, stroke-width .25s" }} />
              );
            })
          )}
        </svg>
        {allNodes.map((n) => {
          const isActive = active === n.id;
          const isHover = hovered === n.id;
          const size = n.core ? 74 : 46;
          return (
            <button key={n.id}
              onClick={() => { if (linking) { completeLink(n.id); } else if (!placing) { setActive(n.id); } }}
              onMouseEnter={() => setHovered(n.id)}
              onMouseLeave={() => setHovered(null)}
              aria-label={`Abrir estrela ${n.label}`}
              style={{
                position: "absolute", left: `${n.x}%`, top: `${n.y}%`,
                transform: "translate(-50%,-50%)", width: size, height: size,
                borderRadius: "50%", border: "none", cursor: "pointer", zIndex: 10,
                background: "transparent", outline: "none",
                opacity: active && !isActive ? 0.2 : 1,
                transition: "opacity .6s ease, left .3s ease, top .3s ease",
              }}>
              {/* a bolinha fica EXATAMENTE no centro do botão = ponta da linha */}
              <span style={{
                position: "absolute", left: "50%", top: "50%", transform: "translate(-50%,-50%)",
                width: n.core ? 26 : 14, height: n.core ? 26 : 14, borderRadius: "50%",
                background: n.core ? "radial-gradient(circle, #fff 30%, #AEB9FF 80%)" : `radial-gradient(circle, #fff 30%, ${n.color} 90%)`,
                boxShadow: isActive || isHover ? `0 0 26px 10px ${hexToRgba(n.color, 0.65)}`
                  : n.core ? "0 0 30px 10px rgba(174,185,255,0.4)" : `0 0 12px 3px ${hexToRgba(n.color, 0.35)}`,
                animation: n.core ? "pulse 3.5s ease-in-out infinite" : undefined,
                transition: "box-shadow .25s",
              }} />
              {/* rótulo flutuante abaixo, sem deslocar a bolinha */}
              <span style={{
                position: "absolute", left: "50%", top: `calc(50% + ${n.core ? 22 : 15}px)`,
                transform: "translateX(-50%)",
                fontSize: n.core ? 13 : 11, letterSpacing: "0.14em", textTransform: "uppercase",
                color: isHover ? n.color : "#9FA9C5",
                fontFamily: "'Space Grotesk', sans-serif", fontWeight: 500, whiteSpace: "nowrap",
                transition: "color .25s, opacity .4s", textShadow: "0 0 8px rgba(1,2,8,0.9)",
                opacity: isActive ? 0 : 1,
              }}>
                {n.label}
              </span>
            </button>
          );
        })}
      </div>

      {placing && !readOnly && (
        <div onClick={handleSkyClick}
          style={{ position: "fixed", inset: 0, zIndex: 50, cursor: "crosshair", background: "rgba(220,228,255,0.02)" }}>
          <p style={{
            position: "absolute", top: 80, left: "50%", transform: "translateX(-50%)",
            background: "rgba(3,5,12,0.9)", border: "1px solid rgba(220,228,255,0.4)",
            borderRadius: 999, padding: "10px 22px", fontSize: 13, color: "#DCE4FF",
            letterSpacing: "0.06em", whiteSpace: "nowrap", margin: 0, pointerEvents: "none",
          }}>
            {placing.mode === "new" ? "✦ toque no céu para criar a estrela" : "✥ toque no novo lugar da estrela"}
          </p>
          <button onClick={(e) => { e.stopPropagation(); setPlacing(null); }}
            style={{ position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)", ...UI.ghostBtn, background: "rgba(3,5,12,0.9)" }}>
            Cancelar
          </button>
        </div>
      )}

      {/* modo de ligação: escolher a estrela de origem do caminho */}
      {linking && (
        <React.Fragment>
          <p style={{
            position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)",
            background: "rgba(3,5,12,0.85)", border: "1px solid rgba(195,205,235,0.45)",
            borderRadius: 999, padding: "9px 20px", fontSize: 13, color: "#9FA9C5",
            letterSpacing: "0.06em", zIndex: 45, margin: 0, maxWidth: "88vw", textAlign: "center",
            pointerEvents: "none", // cliques atravessam o aviso e alcançam as estrelas
          }}>
            {hintMsg || "🔗 toque nas estrelas para ligar/desligar esta estrela a elas"}
          </p>
          <button
            onClick={() => { const id = linking; setLinking(null); setHintMsg(""); setActive(id); }}
            style={{
              position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
              ...UI.btn, zIndex: 45,
            }}>
            ✓ Concluir ligações
          </button>
        </React.Fragment>
      )}

      {!active && !placing && !linking && (
        <p style={{
          position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)",
          fontSize: 12, color: "rgba(165,175,200,0.65)", letterSpacing: "0.08em",
          zIndex: 10, textAlign: "center", margin: 0,
        }}>
          toque em uma estrela para explorar ✦ arraste para navegar · scroll para zoom
        </p>
      )}

      {/* recentralizar a câmera */}
      {camFree && camMoved && (
        <button
          onClick={() => setCam({ x: 0, y: 0, k: 1 })}
          style={{
            ...UI.ghostBtn, position: "fixed", right: 16, bottom: 16, zIndex: 20,
            background: "rgba(3,5,12,0.85)",
          }}>
          ⌖ recentralizar
        </button>
      )}

      {/* trilha sonora: player invisível + controles */}
      <audio ref={audioRef} style={{ display: "none" }} />
      {track && spotTrack && soundOn && (
        <div style={{ position: "fixed", left: 16, bottom: 64, zIndex: 20, animation: "fadeIn .6s ease" }}>
          <iframe
            key={spotTrack}
            src={spotTrack}
            width="300" height="80" frameBorder="0"
            allow="encrypted-media; autoplay; clipboard-write"
            title="Player do Spotify"
            style={{ borderRadius: 14, display: "block", boxShadow: "0 8px 30px rgba(0,0,0,0.6)" }} />
        </div>
      )}
      {track && spotTrack && (
        <button
          onClick={() => setSoundOn(!soundOn)}
          aria-label={soundOn ? "Esconder player" : "Mostrar player"}
          style={{
            ...UI.ghostBtn, position: "fixed", left: 16, bottom: 16, zIndex: 20,
            background: "rgba(3,5,12,0.85)", width: 40, height: 40, padding: 0,
            borderRadius: "50%", fontSize: 15,
            color: soundOn ? "#DCE4FF" : "#5A617A",
          }}>
          {soundOn ? "♪" : "∅"}
        </button>
      )}
      {track && !spotTrack && (
        needsTap && soundOn ? (
          <button
            onClick={() => {
              const a = audioRef.current;
              if (a) a.play().then(() => setNeedsTap(false)).catch(() => {});
            }}
            style={{
              ...UI.btn, position: "fixed", left: 16, bottom: 16, zIndex: 20,
              animation: "pulse 2s ease-in-out infinite",
            }}>
            ♪ ativar som do universo
          </button>
        ) : (
          <button
            onClick={() => setSoundOn(!soundOn)}
            aria-label={soundOn ? "Silenciar música" : "Tocar música"}
            style={{
              ...UI.ghostBtn, position: "fixed", left: 16, bottom: 16, zIndex: 20,
              background: "rgba(3,5,12,0.85)", width: 40, height: 40, padding: 0,
              borderRadius: "50%", fontSize: 15,
              color: soundOn ? "#DCE4FF" : "#5A617A",
            }}>
            {soundOn ? "♪" : "∅"}
          </button>
        )
      )}

      {renderFocusScene()}
    </div>
  );
}

function AuthScreen() {
  useEffect(() => { setTabTitle(null); }, []);
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const entrar = async () => {
    setBusy(true); setMsg("");
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) setMsg("Não foi possível entrar: " + error.message);
    setBusy(false);
  };
  const criar = async () => {
    setBusy(true); setMsg("");
    const { data, error } = await sb.auth.signUp({ email, password: senha });
    if (error) setMsg("Erro ao criar conta: " + error.message);
    else if (!data.session) setMsg("Conta criada! Verifique seu e-mail para confirmar e depois entre.");
    setBusy(false);
  };

  return (
    <CenterCard>
      <h1 style={{ ...UI.display, fontSize: 26, fontWeight: 800, letterSpacing: "0.18em", margin: "0 0 4px" }}>NÉBULA</h1>
      <p style={{ color: "#9FA9C5", fontSize: 14, margin: "0 0 28px" }}>seu universo, suas estrelas ✦</p>
      <input style={UI.ghostInput("#AEB9FF")} type="email" placeholder="e-mail" value={email} onChange={(e) => setEmail(e.target.value)} />
      <input style={UI.ghostInput("#AEB9FF")} type="password" placeholder="senha (mín. 6 caracteres)" value={senha} onChange={(e) => setSenha(e.target.value)} />
      {msg && <p style={{ color: "#F5D98B", fontSize: 13, lineHeight: 1.5 }}>{msg}</p>}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>
        <button style={UI.btn} disabled={busy} onClick={entrar}>Entrar</button>
        <button style={UI.ghostBtn} disabled={busy} onClick={criar}>Criar conta</button>
      </div>
    </CenterCard>
  );
}

function ClaimHandle({ userId, onDone }) {
  const [handle, setHandle] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const claim = async () => {
    const h = handle.toLowerCase().trim();
    if (!/^[a-z0-9_]{2,30}$/.test(h)) {
      setMsg("Use só letras minúsculas, números e _ (2 a 30 caracteres).");
      return;
    }
    setBusy(true); setMsg("");
    const data = defaultData(h);
    data.perfil.handle = "@" + h;
    const { error } = await sb.from("profiles").insert({ user_id: userId, handle: h, data });
    if (error) {
      setMsg(error.code === "23505" ? "Esse nome já foi tomado por outro viajante. Tente outro!" : "Erro: " + error.message);
      setBusy(false);
    } else {
      onDone({ handle: h, data });
    }
  };

  return (
    <CenterCard>
      <h2 style={{ ...UI.display, fontSize: 20, fontWeight: 600, margin: "0 0 6px" }}>Escolha seu endereço</h2>
      <p style={{ color: "#9FA9C5", fontSize: 14, margin: "0 0 24px" }}>
        Será o link público do seu universo:<br />
        <span style={{ color: "#AEB9FF" }}>{window.location.origin + window.location.pathname}#/@{handle || "seunome"}</span>
      </p>
      <input style={UI.ghostInput("#DCE4FF")} placeholder="seunome" value={handle}
        onChange={(e) => setHandle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && claim()} />
      {msg && <p style={{ color: "#F5D98B", fontSize: 13 }}>{msg}</p>}
      <button style={{ ...UI.btn, marginTop: 10 }} disabled={busy} onClick={claim}>✦ Reivindicar estrela</button>
    </CenterCard>
  );
}

/* ---------- meu universo (logado, salva na nuvem) ---------- */
function MyUniverse({ session }) {
  const [row, setRow] = useState(undefined); // undefined = carregando, null = sem perfil
  const [status, setStatus] = useState("");
  const uid = session.user.id;

  useEffect(() => {
    (async () => {
      const { data } = await sb.from("profiles").select("handle, data").eq("user_id", uid).maybeSingle();
      setRow(data || null);
    })();
  }, [uid]);

  const [perfil, setPerfilState] = useState(null);
  const [stars, setStarsState] = useState(null);
  useEffect(() => {
    if (row) {
      setPerfilState(row.data.perfil);
      setStarsState(row.data.stars || []);
      setTabTitle(row.handle);
    }
  }, [row]);

  // autosave na nuvem
  const first = useRef(true);
  useEffect(() => {
    if (!perfil || !stars) return;
    if (first.current) { first.current = false; return; }
    const t = setTimeout(async () => {
      const { error } = await sb.from("profiles")
        .update({ data: { perfil, stars }, updated_at: new Date().toISOString() })
        .eq("user_id", uid);
      setStatus(error ? "erro ao salvar" : "salvo na nuvem ✦");
      setTimeout(() => setStatus(""), 1800);
    }, 900);
    return () => clearTimeout(t);
  }, [perfil, stars]);

  if (row === undefined) return <LoadingSky texto="abrindo seu universo..." />;
  if (row === null) return <ClaimHandle userId={uid} onDone={(r) => setRow(r)} />;
  if (!perfil || !stars) return <LoadingSky texto="acendendo as estrelas..." />;

  // envia arquivo para o Storage do Supabase e devolve a URL pública
  const uploadFile = async (file) => {
    if (file.size > 8 * 1024 * 1024) throw new Error("arquivo grande demais (máx 8MB)");
    const ext = (file.name.split(".").pop() || "bin").toLowerCase().replace(/[^a-z0-9]/g, "") || "bin";
    const path = uid + "/" + Date.now() + "-" + Math.random().toString(36).slice(2, 7) + "." + ext;
    const { error } = await sb.storage.from("midia").upload(path, file, { contentType: file.type || undefined });
    if (error) throw new Error(error.message.includes("bucket") ? "configure o Storage (script adicionar-uploads.sql)" : error.message);
    return sb.storage.from("midia").getPublicUrl(path).data.publicUrl;
  };

  const link = window.location.origin + window.location.pathname + "#/@" + row.handle;
  const headerRight = (
    <React.Fragment>
      <button style={UI.ghostBtn}
        onClick={() => { navigator.clipboard.writeText(link); setStatus("link copiado ✦"); setTimeout(() => setStatus(""), 1800); }}>
        ⛓ Copiar meu link
      </button>
      <button style={UI.ghostBtn} onClick={() => sb.auth.signOut()}>Sair</button>
    </React.Fragment>
  );

  return (
    <Nebula perfil={perfil} stars={stars} setPerfil={setPerfilState} setStars={setStarsState}
      readOnly={false} headerRight={headerRight} status={status} upload={uploadFile} />
  );
}

/* ---------- visitar universo de alguém ---------- */
function VisitUniverse({ handle }) {
  const [row, setRow] = useState(undefined);
  useEffect(() => {
    (async () => {
      const { data } = await sb.from("profiles").select("handle, data").eq("handle", handle).maybeSingle();
      setRow(data || null);
      setTabTitle(data ? data.handle : null);
    })();
  }, [handle]);

  if (row === undefined) return <LoadingSky texto={`viajando até @${handle}...`} />;
  if (row === null)
    return (
      <CenterCard>
        <h2 style={{ ...UI.display, fontSize: 20 }}>✦ universo não encontrado</h2>
        <p style={{ color: "#9FA9C5", fontSize: 14 }}>Não existe nenhuma constelação em @{handle}.</p>
        <button style={{ ...UI.btn, marginTop: 12 }} onClick={() => { window.location.hash = ""; }}>
          Criar meu universo
        </button>
      </CenterCard>
    );

  const headerRight = (
    <button style={UI.ghostBtn} onClick={() => { window.location.hash = ""; }}>
      ✦ Criar meu universo
    </button>
  );
  return (
    <Nebula perfil={row.data.perfil} stars={row.data.stars || []}
      setPerfil={() => {}} setStars={() => {}} readOnly={true} headerRight={headerRight} status="" />
  );
}

function LoadingSky({ texto }) {
  return (
    <CenterCard>
      <div style={{
        width: 20, height: 20, borderRadius: "50%", margin: "0 auto 16px",
        background: "radial-gradient(circle, #fff 30%, #AEB9FF 80%)",
        boxShadow: "0 0 30px 10px rgba(174,185,255,0.4)", animation: "pulse 1.6s ease-in-out infinite",
      }} />
      <p style={{ color: "#9FA9C5", fontSize: 14, letterSpacing: "0.08em" }}>{texto}</p>
    </CenterCard>
  );
}

/* ---------- modo local (sem Supabase configurado) ---------- */
function LocalUniverse() {
  const [data] = useState(() => {
    try {
      const v = localStorage.getItem("nebula-v2");
      return v ? JSON.parse(v) : defaultData();
    } catch (e) { return defaultData(); }
  });
  const [perfil, setPerfil] = useState(data.perfil);
  const [stars, setStars] = useState(data.stars);
  const [status, setStatus] = useState("");
  const first = useRef(true);
  useEffect(() => {
    if (first.current) { first.current = false; return; }
    const t = setTimeout(() => {
      try { localStorage.setItem("nebula-v2", JSON.stringify({ perfil, stars })); setStatus("salvo ✦"); }
      catch (e) { setStatus("erro ao salvar"); }
      setTimeout(() => setStatus(""), 1500);
    }, 700);
    return () => clearTimeout(t);
  }, [perfil, stars]);

  // modo local: converte a imagem em texto (limite pequeno, o navegador não guarda muito)
  const uploadLocal = (file) =>
    new Promise((res, rej) => {
      if (file.size > 1.2 * 1024 * 1024) return rej(new Error("no modo local o limite é 1,2MB"));
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error("falha ao ler o arquivo"));
      r.readAsDataURL(file);
    });

  return (
    <Nebula perfil={perfil} stars={stars} setPerfil={setPerfil} setStars={setStars}
      readOnly={false} status={status} upload={uploadLocal}
      headerRight={<span style={{ fontSize: 11, color: "#F5D98B" }}>modo local — configure o Supabase</span>} />
  );
}

/* ---------- App raiz ---------- */
function App() {
  const [route, setRoute] = useState(parseHash());
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => {
    if (!hasBackend) { setSession(null); return; }
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (!hasBackend) return route ? <LocalUniverse /> : <LocalUniverse />;
  if (route) return <VisitUniverse handle={route} />;
  if (session === undefined) return <LoadingSky texto="conectando ao cosmos..." />;
  if (!session) return <AuthScreen />;
  return <MyUniverse session={session} />;
}
